<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SEQ - Announcement">
    <title>Announcement - SEQ</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-brand-purple d-flex flex-column align-items-center justify-content-center min-vh-100 p-3">

    <!-- Logo Section -->
    <div class="modal-logo text-center">
        <a class="text-decoration-none d-flex flex-column align-items-center" href="#">
            <div class="position-relative text-white">
                <span class="logo-seq text-white">SEQ</span>
                <svg class="logo-arrow text-white" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="19" x2="19" y2="5"></line>
                    <polyline points="9 5 19 5 19 15"></polyline>
                </svg>
            </div>
            <span class="logo-subtext text-white">GROWTHENGINE</span>
        </a>
    </div>

    <!-- Modal Announcement Card -->
    <div class="modal-content-custom shadow-lg">
        <!-- Close Button -->
        <button class="modal-close-btn" aria-label="Close">&times;</button>
        
        <!-- Gift Icon -->
        <div class="gift-icon-container shadow-sm">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 12 20 22 4 22 4 12"></polyline>
                <rect x="2" y="7" width="20" height="5"></rect>
                <line x1="12" y1="22" x2="12" y2="7"></line>
                <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
            </svg>
        </div>

        <!-- Text Content -->
        <h2 class="fw-bold mb-3 text-dark" style="font-size: 1.85rem; letter-spacing: -0.8px; line-height: 1.2;">
            Initially The Tool Is Absolutely Free For First 10,000 Users
        </h2>
        
        <p class="text-secondary mb-5" style="font-size: 0.95rem;">
            Login to show the pricing list
        </p>
        
        <!-- Action Button -->
        <a href="#" class="btn btn-primary rounded-pill w-100 py-3 fw-bold shadow-sm" style="background-color: #3b28b5; border: none; font-size: 1rem;">
            Go to login
        </a>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- Custom User Scripts -->
    <script src="js/script.js"></script>
</body>

</html>
